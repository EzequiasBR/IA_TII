<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lotomania Previsões Inteligentes</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f7f7f7; }
        .container { max-width: 600px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px #ccc; }
        h1 { text-align: center; color: #2c3e50; }
        label { display: block; margin-top: 15px; }
        input { width: 100%; padding: 8px; margin-top: 5px; border-radius: 4px; border: 1px solid #ccc; }
        button { margin-top: 20px; width: 100%; padding: 12px; background: #2980b9; color: #fff; border: none; border-radius: 4px; font-size: 16px; }
        pre { background: #eee; padding: 15px; border-radius: 4px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Lotomania Previsões Inteligentes</h1>
        <form method="post">
            <label>Robôs:
                <input type="number" name="robos" value="150" min="10" max="500">
            </label>
            <label>Gerações:
                <input type="number" name="geracoes" value="10" min="1" max="100">
            </label>
            <label>Mutação:
                <input type="number" step="0.01" name="mutacao" value="0.03" min="0.01" max="0.2">
            </label>
            <label>Top Percent:
                <input type="number" step="0.01" name="top_percent" value="0.3" min="0.1" max="0.9">
            </label>
            <label>Quantidade de Jogos:
                <input type="number" name="previsoes" value="5" min="1" max="50">
            </label>
            <button type="submit">Gerar Previsões</button>
        </form>
        {% if resultado %}
        <pre>{{ resultado }}</pre>
        {% endif %}
    </div>
</body>
</html>
